<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Français – Troisième</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="style.css">
     <style>
        .cursive-title {
            font-family: 'Segoe UI', 'Brush Script MT', cursive, sans-serif;
            font-size: 2.8rem;
            text-align: center;
            margin: 1rem 0;
            color: #1e3c72;
            font-weight: 500;
        }
        .level-tabs {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
            margin-bottom: 1.5rem;
            border-bottom: 2px solid #e2e8f0;
            padding-bottom: 0.75rem;
            justify-content: center;
        }
        .tab-btn {
            background: #f1f5f9;
            border: none;
            padding: 0.6rem 1.4rem;
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            font-family: inherit;
            color: #334155;
        }
        .tab-btn i {
            margin-right: 8px;
        }
        .tab-btn.active {
            background: #f97316;
            color: white;
            box-shadow: 0 4px 10px rgba(249,115,22,0.3);
        }
        .tab-content {
            display: none;
            animation: fadeIn 0.2s;
        }
        .tab-content.active {
            display: block;
        }
        .planning-table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0 10px;
        }
        .planning-table th, .planning-table td {
            background: #f8fafc;
            padding: 0.8rem;
            border-radius: 1rem;
            text-align: left;
        }
        .planning-table th {
            background: #eef2ff;
            font-weight: 700;
        }
        .file-list {
            list-style: none;
            padding-left: 0;
        }
        .file-list li {
            margin: 0.5rem 0;
            padding: 0.4rem 0;
            border-bottom: 1px dashed #e2e8f0;
        }
        .file-list li i {
            margin-right: 10px;
            color: #f97316;
        }
        .accordion-item {
            background: white;
            border-radius: 1rem;
            margin-bottom: 1rem;
            border: 1px solid #eef2ff;
            overflow: hidden;
        }
        .accordion-header {
            background: #fef9f0;
            padding: 1rem;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .accordion-header:hover {
            background: #fff0e0;
        }
        .accordion-header i {
            transition: transform 0.3s;
        }
        .accordion-content {
            display: none;
            padding: 1rem;
            border-top: 1px solid #e2e8f0;
            background: #ffffff;
        }
        .accordion-content.open {
            display: block;
        }
        .seance-list {
            list-style: none;
            padding-left: 0;
        }
        .seance-list li {
            margin: 0.8rem 0;
            padding: 0.5rem;
            background: #f8fafc;
            border-radius: 0.8rem;
        }
        .seance-title {
            font-weight: 600;
            color: #1e3c72;
        }
        .resource-card {
            background: #fef9f0;
            border-radius: 1rem;
            padding: 1rem;
            margin-bottom: 1rem;
            border-left: 4px solid #f97316;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px);}
            to { opacity: 1; transform: translateY(0);}
        }
        @media (max-width: 700px) {
            .cursive-title {
                font-size: 2rem;
            }
        }
    </style>
</head>
<body>
<div class="main-container">
    <div class="hero">
        <h1><i class="fas fa-book-open"></i> Français – Troisième</h1>
        <p>Prépare-toi pour le Brevet ! 🎓</p>
    </div>

    <div class="nav-bar"><!-- identique --></div>

    <div class="content">
        <div class="card">
            <h2 class="cursive-title">Troisième</h2>
            <div class="level-tabs">
                <button class="tab-btn active" data-tab="cahier3"><i class="fas fa-calendar-alt"></i> Cahier de texte</button>
                <button class="tab-btn" data-tab="projet3"><i class="fas fa-project-diagram"></i> Projet d'apprentissages</button>
                <button class="tab-btn" data-tab="chantier3"><i class="fas fa-tools"></i> Chantier grammatical</button>
                <button class="tab-btn" data-tab="jdl3"><i class="fas fa-book"></i> JDL</button>
                <button class="tab-btn" data-tab="dsdm3"><i class="fas fa-file-alt"></i> DS, DM</button>
                <button class="tab-btn" data-tab="brevet3"><i class="fas fa-graduation-cap"></i> Brevet</button>
            </div>
            <div id="cahier3" class="tab-content active"><div id="cahier3-container">Chargement...</div></div>
            <div id="projet3" class="tab-content"><div id="projets3-container"></div></div>
            <div id="chantier3" class="tab-content"><div id="chantier3-container"></div></div>
            <div id="jdl3" class="tab-content"><!-- contenu similaire --></div>
            <div id="dsdm3" class="tab-content"><!-- ... --></div>
            <div id="brevet3" class="tab-content"><div id="brevet3-container"></div></div>
        </div>
        <footer>© 2025 - Troisième</footer>
    </div>
</div>

<script>
    // Données Troisième
    const projetsData = [
        {
            "titre": "📝 Projet 1 : Préparer l'oral du Brevet",
            "seances": [
                { "titre": "Séance 1 : Choisir son œuvre", "fichiers": [] },
                { "titre": "Séance 2 : Construire un exposé", "fichiers": [{"nom": "Grille d'évaluation", "url": "pdf/grille_oral.pdf"}] },
                { "titre": "Séance 3 : S'entraîner à l'oral", "fichiers": [] },
                { "titre": "Séance 4 : Simulation d'oral", "fichiers": [] }
            ]
        },
        {
            "titre": "📰 Projet 2 : Écrire une nouvelle réaliste",
            "seances": [
                { "titre": "Séance 1 : Lire Maupassant", "fichiers": [{"nom": "Nouvelle exemple", "url": "pdf/maupassant_extrait.pdf"}] },
                { "titre": "Séance 2 : Créer un personnage", "fichiers": [] },
                { "titre": "Séance 3 : Écrire la chute", "fichiers": [] },
                { "titre": "Séance 4 : Correction", "fichiers": [] }
            ]
        }
    ];

    const chantiersData = [
        { "titre": "📖 Chantier n°1 – La poésie engagée", "description": "Analyse de poèmes engagés (Aragon, Eluard).", "fichiers": [{"nom": "Anthologie", "url": "pdf/3e_poesie_engagee.pdf"}] },
        { "titre": "🎭 Chantier n°2 – Le texte théâtral", "description": "Didascalies, tirade, sous-texte.", "fichiers": [{"nom": "Méthode", "url": "pdf/3e_analyse_theatre.pdf"}] },
        { "titre": "✍️ Chantier n°3 – La contraction de texte", "description": "Méthodologie pour l'épreuve écrite.", "fichiers": [{"nom": "Fiche pratique", "url": "pdf/3e_contraction.pdf"}] }
    ];

    const brevetData = {
        "annales": [
            { "nom": "Brevet 2024 – sujet et corrigé", "url": "pdf/brevet_2024_francais.pdf" },
            { "nom": "Brevet 2023", "url": "pdf/brevet_2023_francais.pdf" }
        ],
        "methodes": [
            { "nom": "Guide oral du brevet", "url": "pdf/conseils_oral_brevet.pdf" }
        ],
        "liens": [
            { "nom": "Vidéo : Réussir la rédaction", "url": "https://www.youtube.com/watch?v=example" }
        ]
    };

    // Fonctions d'affichage (buildProjets, buildChantiers, loadCahierTexte, buildBrevet)
    function buildBrevet(containerId) {
        const container = document.getElementById(containerId);
        if (!container) return;
        let html = '';
        if (brevetData.annales.length) {
            html += `<div class="resource-card"><h3>📘 Annales corrigées</h3><ul class="file-list">`;
            brevetData.annales.forEach(a => { html += `<li><i class="fas fa-file-pdf"></i> <a href="${a.url}" target="_blank">${a.nom}</a></li>`; });
            html += `</ul></div>`;
        }
        if (brevetData.methodes.length) {
            html += `<div class="resource-card"><h3>📝 Méthodologie</h3><ul class="file-list">`;
            brevetData.methodes.forEach(m => { html += `<li><i class="fas fa-file-pdf"></i> <a href="${m.url}" target="_blank">${m.nom}</a></li>`; });
            html += `</ul></div>`;
        }
        if (brevetData.liens.length) {
            html += `<div class="resource-card"><h3>🔗 Liens utiles</h3><ul class="file-list">`;
            brevetData.liens.forEach(l => { html += `<li><i class="fas fa-link"></i> <a href="${l.url}" target="_blank">${l.nom}</a></li>`; });
            html += `</ul></div>`;
        }
        container.innerHTML = html || '<p>Aucune ressource Brevet pour le moment.</p>';
    }

    // Gestion des onglets identique
    // ...
    window.onload = () => {
        loadCahierTexte('troisième', 'cahier3-container');
        buildProjets('projets3-container');
        buildChantiers('chantier3-container');
        buildBrevet('brevet3-container');
    };
</script>
</body>
</html>
