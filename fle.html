<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Français – FLE (Français Langue Étrangère)</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <style>
        .cursive-title {
            font-family: 'Segoe UI', 'Brush Script MT', cursive, sans-serif;
            font-size: 2.8rem;
            text-align: center;
            margin: 1rem 0;
            color: #1e3c72;
            font-weight: 500;
        }
        .level-tabs {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
            margin-bottom: 1.5rem;
            border-bottom: 2px solid #e2e8f0;
            padding-bottom: 0.75rem;
            justify-content: center;
        }
        .tab-btn {
            background: #f1f5f9;
            border: none;
            padding: 0.6rem 1.4rem;
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            font-family: inherit;
            color: #334155;
        }
        .tab-btn i {
            margin-right: 8px;
        }
        .tab-btn.active {
            background: #f97316;
            color: white;
            box-shadow: 0 4px 10px rgba(249,115,22,0.3);
        }
        .tab-content {
            display: none;
            animation: fadeIn 0.2s;
        }
        .tab-content.active {
            display: block;
        }
        .planning-table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0 10px;
        }
        .planning-table th, .planning-table td {
            background: #f8fafc;
            padding: 0.8rem;
            border-radius: 1rem;
            text-align: left;
        }
        .planning-table th {
            background: #eef2ff;
            font-weight: 700;
        }
        .file-list {
            list-style: none;
            padding-left: 0;
        }
        .file-list li {
            margin: 0.5rem 0;
            padding: 0.4rem 0;
            border-bottom: 1px dashed #e2e8f0;
        }
        .file-list li i {
            margin-right: 10px;
            color: #f97316;
        }
        .accordion-item {
            background: white;
            border-radius: 1rem;
            margin-bottom: 1rem;
            border: 1px solid #eef2ff;
            overflow: hidden;
        }
        .accordion-header {
            background: #fef9f0;
            padding: 1rem;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .accordion-header:hover {
            background: #fff0e0;
        }
        .accordion-header i {
            transition: transform 0.3s;
        }
        .accordion-content {
            display: none;
            padding: 1rem;
            border-top: 1px solid #e2e8f0;
            background: #ffffff;
        }
        .accordion-content.open {
            display: block;
        }
        .seance-list {
            list-style: none;
            padding-left: 0;
        }
        .seance-list li {
            margin: 0.8rem 0;
            padding: 0.5rem;
            background: #f8fafc;
            border-radius: 0.8rem;
        }
        .seance-title {
            font-weight: 600;
            color: #1e3c72;
        }
        .resource-card {
            background: #fef9f0;
            border-radius: 1rem;
            padding: 1rem;
            margin-bottom: 1rem;
            border-left: 4px solid #f97316;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px);}
            to { opacity: 1; transform: translateY(0);}
        }
        @media (max-width: 700px) {
            .cursive-title { font-size: 2rem; }
        }
        .star-red {
            color: #e74c3c;
            font-weight: bold;
            margin-left: 5px;
            text-decoration: none;
        }
        .star-red:hover {
            text-decoration: underline;
        }
        audio {
            border-radius: 30px;
            width: 100%;
            max-width: 300px;
        }
    </style>
</head>
<body>
<div class="main-container">
    <div class="hero">
        <h1><i class="fas fa-globe"></i> Français Langue Étrangère (FLE)</h1>
        <p>Apprendre le français pas à pas</p>
    </div>

    <div class="nav-bar">
        <a href="index.html" class="nav-btn"><i class="fas fa-home"></i> Accueil</a>
        <a href="six.html" class="nav-btn">Sixième</a>
        <a href="cinquieme.html" class="nav-btn">Cinquième</a>
        <a href="quatrieme.html" class="nav-btn">Quatrième</a>
        <a href="troisieme.html" class="nav-btn">Troisième</a>
        <a href="seconde.html" class="nav-btn">Seconde</a>
        <a href="bac.html" class="nav-btn">Première - BAC</a>
        <a href="fle.html" class="nav-btn"><i class="fas fa-language"></i> FLE</a>
        <a href="divers.html" class="nav-btn"><i class="fas fa-folder-open"></i> Divers</a>
    </div>

    <div class="content">
        <div class="card">
            <h2 class="cursive-title">Français Langue Étrangère</h2>

            <!-- Onglets principaux -->
            <div class="level-tabs">
                <button class="tab-btn active" data-tab="cahierFLE"><i class="fas fa-calendar-alt"></i> Cahier de texte</button>
                <button class="tab-btn" data-tab="projetFLE"><i class="fas fa-project-diagram"></i> Projet d'apprentissage</button>
                <button class="tab-btn" data-tab="vocabFLE"><i class="fas fa-spell-check"></i> Vocabulaire</button>
                <button class="tab-btn" data-tab="soutienFLE"><i class="fas fa-hand-holding-heart"></i> Soutien FLE</button>
                <button class="tab-btn" data-tab="jdlFLE"><i class="fas fa-book"></i> JDL</button>
                <button class="tab-btn" data-tab="projetnFLE"><i class="fas fa-tasks"></i> Projets</button>
                <button class="tab-btn" data-tab="delfFLE"><i class="fas fa-certificate"></i> DELF</button>
            </div>

            <!-- Cahier de texte -->
            <div id="cahierFLE" class="tab-content active">
                <div id="cahierFLE-container">Chargement du cahier de texte...</div>
            </div>

            <!-- Projet d'apprentissage -->
            <div id="projetFLE" class="tab-content"><div id="projetsFLE-container"></div></div>
            <!-- Vocabulaire -->
            <div id="vocabFLE" class="tab-content"><div id="vocabFLE-container"></div></div>
            <!-- Soutien FLE -->
            <div id="soutienFLE" class="tab-content"><div id="soutienFLE-container"></div></div>
            <!-- JDL -->
            <div id="jdlFLE" class="tab-content"><div id="jdlFLE-container"></div></div>
            <!-- Projets complémentaires -->
            <div id="projetnFLE" class="tab-content"><div id="projetnFLE-container"></div></div>
            <!-- DELF -->
            <div id="delfFLE" class="tab-content"><div id="delfFLE-container"></div></div>
        </div>
        <footer> Français Langue Étrangère</footer>
    </div>
</div>

<script>
    // ========== CAHIER DE TEXTE INTÉGRÉ ==========
    const cahierTexteData = [
        { date: "Semaine 1", seance: "Se présenter", aFaire: "Apprendre les salutations" },
        { date: "Semaine 2", seance: "Les verbes du 1er groupe", aFaire: "Exercices PDF" },
        { date: "Semaine 3", seance: "Vocabulaire de la maison", aFaire: "Schéma légendé" }
    ];

    function loadCahierTexte(containerId) {
        const container = document.getElementById(containerId);
        if (!container) return;
        if (cahierTexteData.length === 0) {
            container.innerHTML = '<p>Aucune entrée pour le moment.</p>';
            return;
        }
        let html = `<table class="planning-table">
                        <thead>
                            <tr><th>Date</th><th>Séance</th><th>À faire</th></tr>
                        </thead>
                        <tbody>`;
        cahierTexteData.forEach(entry => {
            html += `<tr>
                        <td>${entry.date || ''}</td>
                        <td>${entry.seance || ''}</td>
                        <td>${entry.aFaire || ''}</td>
                     </tr>`;
        });
        html += `</tbody>
                 </table>`;
        container.innerHTML = html;
    }

    // ========== DONNÉES DES AUTRES ONGLETS (inchangées) ==========
    const projetsData = [
        {
            "titre": "📖 Projet 1 : Se présenter et parler de soi",
            "seances": [
                { "titre": "Séance 1 : Les salutations et formules de politesse", "fichiers": [{"nom": "Fiche de vocabulaire", "url": "pdf/fle/salutations.pdf"}] },
                { "titre": "Séance 2 : Dire son nom, son âge, sa nationalité", "fichiers": [{"nom": "Exercices", "url": "pdf/fle/se_presenter_exos.pdf"}] },
                { "titre": "Séance 3 : Parler de ses goûts (aimer, adorer, détester)", "fichiers": [] },
                { "titre": "Séance 4 : Jeu de rôle : rencontre entre deux personnes", "fichiers": [] }
            ]
        },
        {
            "titre": "🏠 Projet 2 : Décrire sa maison et son quartier",
            "seances": [
                { "titre": "Séance 1 : Vocabulaire de la maison", "fichiers": [{"nom": "Planche d'images", "url": "pdf/fle/maison_vocab.pdf"}] },
                { "titre": "Séance 2 : Les prépositions de lieu", "fichiers": [] },
                { "titre": "Séance 3 : Écrire une description courte", "fichiers": [{"nom": "Modèle de description", "url": "pdf/fle/description_maison.pdf"}] },
                { "titre": "Séance 4 : Présentation orale", "fichiers": [] }
            ]
        }
    ];

    const vocabData = [
        {
            "titre": "📚 Thème 1 : Les couleurs et les formes",
            "seances": [
                { "titre": "Liste de vocabulaire : couleurs de base", "fichiers": [{"nom": "Fiche récapitulative", "url": "pdf/fle/couleurs.pdf"}] },
                { "titre": "Les formes (carré, rond, triangle...)", "fichiers": [{"nom": "Images", "url": "pdf/fle/formes.pdf"}] },
                { "titre": "Exercices d'association", "fichiers": [] }
            ]
        },
        {
            "titre": "🍽️ Thème 2 : La nourriture et les repas",
            "seances": [
                { "titre": "Vocabulaire des aliments", "fichiers": [{"nom": "Liste illustrée", "url": "pdf/fle/aliments.pdf"}] },
                { "titre": "Les verbes : manger, boire, cuisiner", "fichiers": [] },
                { "titre": "Dialogue au restaurant", "fichiers": [{"nom": "Script du dialogue", "url": "pdf/fle/restaurant_dialogue.pdf"}] }
            ]
        },
        {
            "titre": "⏰ Thème 3 : Les moments de la journée et les heures",
            "seances": [
                { "titre": "Dire l'heure", "fichiers": [{"nom": "Horloge à découper", "url": "pdf/fle/heures.pdf"}] },
                { "titre": "Routine quotidienne", "fichiers": [] }
            ]
        }
    ];

    const soutienData = [
        {
            "titre": "🔊 Phonétique : les sons du français",
            "seances": [
                { "titre": "Le son [u] et [y] (ou / u)", "fichiers": [{"nom": "Fiche de prononciation", "url": "pdf/fle/sons_ou_u.pdf"}, {"nom": "Audio", "url": "audio/fle/sons_ou_u.mp3"}] },
                { "titre": "Les nasales (an, in, on, un)", "fichiers": [{"nom": "Exercices", "url": "pdf/fle/nasales.pdf"}] },
                { "titre": "La liaison", "fichiers": [] }
            ]
        },
        {
            "titre": "✍️ Grammaire de base",
            "seances": [
                { "titre": "Le présent des verbes en -er", "fichiers": [{"nom": "Tableau de conjugaison", "url": "pdf/fle/present_er.pdf"}] },
                { "titre": "Les articles définis et indéfinis", "fichiers": [] },
                { "titre": "La négation (ne... pas)", "fichiers": [{"nom": "Exercices", "url": "pdf/fle/negation.pdf"}] }
            ]
        },
        {
            "titre": "📝 Compréhension écrite",
            "seances": [
                { "titre": "Lire un petit texte : 'Ma journée'", "fichiers": [{"nom": "Texte + questions", "url": "pdf/fle/lecture_journee.pdf"}] },
                { "titre": "Comprendre une recette de cuisine", "fichiers": [] }
            ]
        }
    ];

    const jdlData = [
        {
            "titre": "🎧 Dictées FLE",
            "seances": [
                { "titre": "Dictée 1 : Les vacances", "fichiers": [{"nom": "Audio", "url": "audio/fle/dictee_vacances.mp3"}, {"nom": "Texte", "url": "pdf/fle/dictee_vacances_texte.pdf"}] },
                { "titre": "Dictée 2 : Au marché", "fichiers": [{"nom": "Audio", "url": "audio/fle/dictee_marche.mp3"}] }
            ]
        },
        {
            "titre": "💡 Mot de la semaine",
            "seances": [
                { "titre": "Semaine 1 : 'Chaleureux'", "fichiers": [{"nom": "Fiche étymologique", "url": "pdf/fle/mot_chaleureux.pdf"}] },
                { "titre": "Semaine 2 : 'Dépaysement'", "fichiers": [] }
            ]
        },
        {
            "titre": "🧩 Jeux de langue",
            "seances": [
                { "titre": "Mots croisés : les métiers", "fichiers": [{"nom": "Grille", "url": "pdf/fle/mots_croises_metiers.pdf"}] },
                { "titre": "Devinettes phonétiques", "fichiers": [] }
            ]
        }
    ];

    const projetnData = [
        {
            "titre": "🎬 Projetn 1 : Créer une mini-pièce de théâtre",
            "seances": [
                { "titre": "Séance 1 : Écrire un dialogue simple", "fichiers": [{"nom": "Guide d'écriture", "url": "pdf/fle/guide_dialogue.pdf"}] },
                { "titre": "Séance 2 : Jouer la scène", "fichiers": [] }
            ]
        },
        {
            "titre": "📷 Projetn 2 : Réaliser un reportage photo sur son quartier",
            "seances": [
                { "titre": "Séance 1 : Prendre des photos et légender", "fichiers": [] },
                { "titre": "Séance 2 : Présentation orale", "fichiers": [{"nom": "Exemple", "url": "pdf/fle/reportage_exemple.pdf"}] }
            ]
        }
    ];

    // ========== NOUVEL ONGLET DELF ==========
    const delfData = [
        {
            titre: "DELF A1 (débutant)",
            lienOfficiel: "#",   // ← Remplace par le vrai lien vers le site officiel
            sujets: [
                { nom: "Sujet 1 – Se présenter", pdf: "pdf/delf/a1_sujet1.pdf", audio: "audio/delf/a1_presentation.mp3" },
                { nom: "Sujet 2 – La vie quotidienne", pdf: "pdf/delf/a1_sujet2.pdf", audio: "audio/delf/a1_marche.mp3" }
            ]
        },
        {
            titre: "DELF A2 (intermédiaire)",
            lienOfficiel: "#",
            sujets: [
                { nom: "Sujet 1 – Décrire un lieu", pdf: "pdf/delf/a2_sujet1.pdf", audio: "audio/delf/a2_ville.mp3" },
                { nom: "Sujet 2 – Raconter une expérience", pdf: "pdf/delf/a2_sujet2.pdf", audio: "audio/delf/a2_temoignage.mp3" }
            ]
        },
        {
            titre: "DELF B1 (seuil)",
            lienOfficiel: "#",
            sujets: [
                { nom: "Sujet 1 – Donner son avis", pdf: "pdf/delf/b1_sujet1.pdf", audio: "audio/delf/b1_debat.mp3" },
                { nom: "Sujet 2 – Comprendre une interview", pdf: "pdf/delf/b1_sujet2.pdf", audio: "audio/delf/b1_interview.mp3" }
            ]
        },
        {
            titre: "DELF B2 (avancé)",
            lienOfficiel: "#",
            sujets: [
                { nom: "Sujet 1 – Argumentation", pdf: "pdf/delf/b2_sujet1.pdf", audio: "audio/delf/b2_conference.mp3" },
                { nom: "Sujet 2 – Analyse de document", pdf: "pdf/delf/b2_sujet2.pdf", audio: "audio/delf/b2_reportage.mp3" }
            ]
        }
    ];

    // Fonction d'affichage DELF (astérisque cliquable, lecteurs audio)
    function buildDelf() {
        const container = document.getElementById('delfFLE-container');
        if (!container) return;
        let html = '';
        delfData.forEach((niveau, idx) => {
            // Astérisque cliquable vers le site officiel
            const etoile = (niveau.lienOfficiel && niveau.lienOfficiel !== '#')
                ? `<a href="${niveau.lienOfficiel}" target="_blank" class="star-red" title="Voir les ressources officielles"> *</a>`
                : `<span class="star-red" title="Lien non encore renseigné"> *</span>`;
            html += `<div class="accordion-item">
                        <div class="accordion-header" data-accordion="${idx}">
                            <span>${niveau.titre}${etoile}</span>
                            <i class="fas fa-chevron-down"></i>
                        </div>
                        <div class="accordion-content" id="accordion-content-${idx}">
                            <ul class="seance-list">`;
            niveau.sujets.forEach(sujet => {
                html += `<li><span class="seance-title">📌 ${sujet.nom}</span>`;
                if (sujet.pdf) {
                    html += `<div style="margin-top:0.5rem;"><i class="fas fa-file-pdf"></i> <a href="${sujet.pdf}" target="_blank">Télécharger le sujet</a></div>`;
                }
                if (sujet.audio) {
                    html += `<div style="margin-top:0.5rem;"><i class="fas fa-headphones"></i> Écouter l’audio :<br>
                             <audio controls src="${sujet.audio}" style="max-width:100%; margin-top:0.3rem;"></audio></div>`;
                }
                html += `</li>`;
            });
            html += `</ul></div></div>`;
        });
        container.innerHTML = html;

        // Activer les accordéons
        document.querySelectorAll('#delfFLE-container .accordion-header').forEach(header => {
            header.addEventListener('click', function() {
                const content = this.nextElementSibling;
                const icon = this.querySelector('i');
                content.classList.toggle('open');
                icon.style.transform = content.classList.contains('open') ? 'rotate(180deg)' : 'rotate(0deg)';
            });
        });
    }

    // ========== FONCTION D'ACCORDÉON GÉNÉRIQUE ==========
    function buildAccordion(containerId, data) {
        const container = document.getElementById(containerId);
        if (!container) return;
        let html = '';
        data.forEach((item, idx) => {
            html += `<div class="accordion-item">
                        <div class="accordion-header" data-accordion="${idx}">
                            <span>${item.titre}</span>
                            <i class="fas fa-chevron-down"></i>
                        </div>
                        <div class="accordion-content" id="accordion-content-${idx}">
                            <ul class="seance-list">`;
            item.seances.forEach(seance => {
                html += `<li><span class="seance-title">📌 ${seance.titre}</span>`;
                if (seance.fichiers && seance.fichiers.length) {
                    html += `<ul class="file-list" style="margin-top:0.5rem;">`;
                    seance.fichiers.forEach(f => {
                        let icon = 'fas fa-file-pdf';
                        if (f.url.endsWith('.mp3')) icon = 'fas fa-headphones';
                        else if (f.url.includes('youtube')) icon = 'fab fa-youtube';
                        html += `<li><i class="${icon}"></i> <a href="${f.url}" target="_blank">${f.nom}</a></li>`;
                    });
                    html += `</ul>`;
                }
                html += `</li>`;
            });
            html += `</ul></div></div>`;
        });
        container.innerHTML = html;
        document.querySelectorAll(`#${containerId} .accordion-header`).forEach(header => {
            header.addEventListener('click', function() {
                const content = this.nextElementSibling;
                const icon = this.querySelector('i');
                content.classList.toggle('open');
                icon.style.transform = content.classList.contains('open') ? 'rotate(180deg)' : 'rotate(0deg)';
            });
        });
    }

    // ==================== GESTION DES ONGLETS ====================
    const tabs = document.querySelectorAll('.tab-btn');
    const contents = document.querySelectorAll('.tab-content');
    tabs.forEach(tab => {
        tab.addEventListener('click', () => {
            const targetId = tab.getAttribute('data-tab');
            tabs.forEach(t => t.classList.remove('active'));
            contents.forEach(c => c.classList.remove('active'));
            tab.classList.add('active');
            document.getElementById(targetId).classList.add('active');
        });
    });

    // ==================== INITIALISATION ====================
    window.onload = () => {
        loadCahierTexte('cahierFLE-container');
        buildAccordion('projetsFLE-container', projetsData);
        buildAccordion('vocabFLE-container', vocabData);
        buildAccordion('soutienFLE-container', soutienData);
        buildAccordion('jdlFLE-container', jdlData);
        buildAccordion('projetnFLE-container', projetnData);
        buildDelf();   // Affichage de l'onglet DELF
    };
</script>
</body>
</html>
