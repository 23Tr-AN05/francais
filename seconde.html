<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Français – Seconde</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <style>
        .cursive-title {
            font-family: 'Segoe UI', 'Brush Script MT', cursive, sans-serif;
            font-size: 2.8rem;
            text-align: center;
            margin: 1rem 0;
            color: #1e3c72;
            font-weight: 500;
        }
        .level-tabs {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
            margin-bottom: 1.5rem;
            border-bottom: 2px solid #e2e8f0;
            padding-bottom: 0.75rem;
            justify-content: center;
        }
        .tab-btn {
            background: #f1f5f9;
            border: none;
            padding: 0.6rem 1.4rem;
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            font-family: inherit;
            color: #334155;
        }
        .tab-btn i {
            margin-right: 8px;
        }
        .tab-btn.active {
            background: #f97316;
            color: white;
            box-shadow: 0 4px 10px rgba(249,115,22,0.3);
        }
        .tab-content {
            display: none;
            animation: fadeIn 0.2s;
        }
        .tab-content.active {
            display: block;
        }
        .planning-table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0 10px;
        }
        .planning-table th, .planning-table td {
            background: #f8fafc;
            padding: 0.8rem;
            border-radius: 1rem;
            text-align: left;
        }
        .planning-table th {
            background: #eef2ff;
            font-weight: 700;
        }
        .file-list {
            list-style: none;
            padding-left: 0;
        }
        .file-list li {
            margin: 0.5rem 0;
            padding: 0.4rem 0;
            border-bottom: 1px dashed #e2e8f0;
        }
        .file-list li i {
            margin-right: 10px;
            color: #f97316;
        }
        .accordion-item {
            background: white;
            border-radius: 1rem;
            margin-bottom: 1rem;
            border: 1px solid #eef2ff;
            overflow: hidden;
        }
        .accordion-header {
            background: #fef9f0;
            padding: 1rem;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .accordion-header:hover {
            background: #fff0e0;
        }
        .accordion-header i {
            transition: transform 0.3s;
        }
        .accordion-content {
            display: none;
            padding: 1rem;
            border-top: 1px solid #e2e8f0;
            background: #ffffff;
        }
        .accordion-content.open {
            display: block;
        }
        .seance-list {
            list-style: none;
            padding-left: 0;
        }
        .seance-list li {
            margin: 0.8rem 0;
            padding: 0.5rem;
            background: #f8fafc;
            border-radius: 0.8rem;
        }
        .seance-title {
            font-weight: 600;
            color: #1e3c72;
        }
        .resource-card {
            background: #fef9f0;
            border-radius: 1rem;
            padding: 1rem;
            margin-bottom: 1rem;
            border-left: 4px solid #f97316;
        }
        .oeuvre-pdf {
            background: #eef2ff;
            border-radius: 1rem;
            padding: 1rem;
            margin-bottom: 1.5rem;
            display: flex;
            align-items: center;
            gap: 1rem;
        }
        .oeuvre-pdf i {
            font-size: 2rem;
            color: #f97316;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px);}
            to { opacity: 1; transform: translateY(0);}
        }
        @media (max-width: 700px) {
            .cursive-title { font-size: 2rem; }
        }
    </style>
</head>
<body>
<div class="main-container">
    <div class="hero">
        <h1><i class="fas fa-book-open"></i> Français – Seconde</h1>
        <p>Consolide ta culture littéraire et prépare la Première ! 📖</p>
    </div>

    <div class="nav-bar">
        <a href="index.html" class="nav-btn"><i class="fas fa-home"></i> Accueil</a>
        <a href="six.html" class="nav-btn">Sixième</a>
        <a href="cinquieme.html" class="nav-btn">Cinquième</a>
        <a href="quatrieme.html" class="nav-btn">Quatrième</a>
        <a href="troisieme.html" class="nav-btn">Troisième</a>
        <a href="seconde.html" class="nav-btn">Seconde</a>
        <a href="bac.html" class="nav-btn">Première - BAC</a>
        <a href="fle.html" class="nav-btn"><i class="fas fa-language"></i> FLE</a>
        <a href="divers.html" class="nav-btn"><i class="fas fa-folder-open"></i> Divers</a>
    </div>

    <div class="content">
        <div class="card">
            <h2 class="cursive-title">Seconde</h2>

            <div class="level-tabs">
                <button class="tab-btn active" data-tab="cahier2"><i class="fas fa-calendar-alt"></i> Cahier de texte</button>
                <button class="tab-btn" data-tab="projet2"><i class="fas fa-project-diagram"></i> Projet d'apprentissages</button>
                <button class="tab-btn" data-tab="chantier2"><i class="fas fa-tools"></i> Chantier grammatical</button>
                <button class="tab-btn" data-tab="jdl2"><i class="fas fa-book"></i> JDL</button>
                <button class="tab-btn" data-tab="dsdm2"><i class="fas fa-file-alt"></i> DS, DM</button>
                <button class="tab-btn" data-tab="methodo2"><i class="fas fa-chalkboard-teacher"></i> Méthodologie</button>
                <button class="tab-btn" data-tab="boite2"><i class="fas fa-toolbox"></i> Boîte à outils</button>
            </div>

            <!-- Cahier de texte avec PDF des œuvres -->
            <div id="cahier2" class="tab-content active">
                <div class="oeuvre-pdf">
                    <i class="fas fa-book"></i>
                    <div>
                        <strong>📖 Œuvres au programme de l'année</strong><br>
                        <a href="pdf/2nde/programme_oeuvres.pdf" target="_blank">📄 Télécharger le récapitulatif des œuvres (PDF)</a>
                    </div>
                </div>
                <div id="cahier2-container">Chargement du cahier de texte...</div>
            </div>

            <!-- Projet d'apprentissages -->
            <div id="projet2" class="tab-content">
                <div id="projets2-container"></div>
            </div>

            <!-- Chantier grammatical -->
            <div id="chantier2" class="tab-content">
                <div id="chantier2-container"></div>
            </div>

            <!-- JDL -->
            <div id="jdl2" class="tab-content">
                <div id="jdl2-container"></div>
            </div>

            <!-- DS / DM -->
            <div id="dsdm2" class="tab-content">
                <div id="dsdm2-container"></div>
            </div>

            <!-- Méthodologie (accordéon) -->
            <div id="methodo2" class="tab-content">
                <div id="methodo2-container"></div>
            </div>

            <!-- Boîte à outils (accordéon) -->
            <div id="boite2" class="tab-content">
                <div id="boite2-container"></div>
            </div>
        </div>
        <footer> Seconde</footer>
    </div>
</div>

<script>
    // ==================== DONNÉES INTÉGRÉES ====================

    // Projets d'apprentissages
    const projetsData = [
        {
            "titre": "📝 Projet 1 : Écrire un essai argumenté",
            "seances": [
                { "titre": "Séance 1 : Comprendre la structure d'un essai", "fichiers": [{"nom": "Guide méthodologique", "url": "pdf/2nde/guide_essai.pdf"}] },
                { "titre": "Séance 2 : Choisir un sujet et rassembler des arguments", "fichiers": [] },
                { "titre": "Séance 3 : Rédiger l'introduction et la conclusion", "fichiers": [{"nom": "Exemples", "url": "pdf/2nde/intro_conclu.pdf"}] },
                { "titre": "Séance 4 : Rédaction complète et correction", "fichiers": [] }
            ]
        },
        {
            "titre": "🎭 Projet 2 : Analyser une scène de théâtre classique",
            "seances": [
                { "titre": "Séance 1 : Lecture d'une scène (Le Cid)", "fichiers": [{"nom": "Texte", "url": "pdf/2nde/cid_scene.pdf"}] },
                { "titre": "Séance 2 : Les enjeux dramatiques", "fichiers": [] },
                { "titre": "Séance 3 : Mise en voix et interprétation", "fichiers": [] }
            ]
        }
    ];

    // Chantiers grammaticaux
    const chantiersData = [
        {
            "titre": "✍️ Chantier n°1 – La cohérence textuelle",
            "seances": [
                { "titre": "Connecteurs logiques", "fichiers": [{"nom": "Fiche récapitulative", "url": "pdf/2nde/connecteurs.pdf"}] },
                { "titre": "Anaphores et substitution", "fichiers": [] },
                { "titre": "Temps verbaux et narration", "fichiers": [] }
            ]
        },
        {
            "titre": "🎨 Chantier n°2 – Les figures de style",
            "seances": [
                { "titre": "Métaphore, comparaison, personnification", "fichiers": [{"nom": "Liste des figures", "url": "pdf/2nde/figures_styles.pdf"}] },
                { "titre": "Hyperbole, antiphrase, euphémisme", "fichiers": [] }
            ]
        },
        {
            "titre": "🔍 Chantier n°3 – L'analyse du discours",
            "seances": [
                { "titre": "Énonciation et registres", "fichiers": [] },
                { "titre": "Les types de discours (narratif, descriptif, argumentatif)", "fichiers": [{"nom": "Exercices", "url": "pdf/2nde/types_discours.pdf"}] }
            ]
        }
    ];

    // JDL
    const jdlData = [
        {
            "titre": "🎧 Dictées préparées",
            "seances": [
                { "titre": "Dictée : La littérature engagée", "fichiers": [{"nom": "Audio", "url": "audio/2nde/dictee_engagee.mp3"}, {"nom": "Texte", "url": "pdf/2nde/dictee_engagee_texte.pdf"}] },
                { "titre": "Dictée : Le classicisme", "fichiers": [] }
            ]
        },
        {
            "titre": "💡 Le mot de la semaine",
            "seances": [
                { "titre": "Ambivalence", "fichiers": [{"nom": "Fiche étymologique", "url": "pdf/2nde/mot_ambivalence.pdf"}] },
                { "titre": "Nostalgie", "fichiers": [] }
            ]
        },
        {
            "titre": "🧩 Quiz littéraires",
            "seances": [
                { "titre": "Mouvements littéraires", "fichiers": [{"nom": "Quiz PDF", "url": "pdf/2nde/quiz_mouvements.pdf"}] },
                { "titre": "Auteurs du XVIIe siècle", "fichiers": [] }
            ]
        }
    ];

    // DS / DM
    const dsdmlist = [
        { "nom": "DS 1 – Commentaire composé", "url": "pdf/2nde/ds_commentaire.pdf" },
        { "nom": "DM 1 – Dissertation sur l'argumentation", "url": "pdf/2nde/dm_dissertation.pdf" },
        { "nom": "DS 2 – Analyse grammaticale", "url": "pdf/2nde/ds_grammaire.pdf" }
    ];

    // Méthodologie (conseils, guides)
    const methodoData = [
        {
            "titre": "📝 Méthodologie de la dissertation",
            "seances": [
                { "titre": "Analyser le sujet", "fichiers": [{"nom": "Guide", "url": "pdf/2nde/methodo_dissertation.pdf"}] },
                { "titre": "Construire un plan", "fichiers": [] },
                { "titre": "Rédiger l'introduction et la conclusion", "fichiers": [] }
            ]
        },
        {
            "titre": "🔍 Méthodologie du commentaire composé",
            "seances": [
                { "titre": "Lire et dégager une problématique", "fichiers": [] },
                { "titre": "Rédiger un paragraphe argumenté", "fichiers": [{"nom": "Exemple", "url": "pdf/2nde/methodo_commentaire.pdf"}] }
            ]
        },
        {
            "titre": "🎤 L'oral du bac (préparation en Seconde)",
            "seances": [
                { "titre": "Préparer une explication linéaire", "fichiers": [] },
                { "titre": "Gérer son stress", "fichiers": [] }
            ]
        }
    ];

    // Boîte à outils (ressources transversales)
    const boiteData = [
        {
            "titre": "📚 Figures de style",
            "seances": [
                { "titre": "Fiche récapitulative", "fichiers": [{"nom": "PDF", "url": "pdf/2nde/figures_styles.pdf"}] },
                { "titre": "Exercices", "fichiers": [] }
            ]
        },
        {
            "titre": "🌍 Contexte culturel (histoire littéraire)",
            "seances": [
                { "titre": "Mouvements littéraires", "fichiers": [{"nom": "Frise chronologique", "url": "pdf/2nde/frise_litteraire.pdf"}] },
                { "titre": "Auteurs incontournables", "fichiers": [] }
            ]
        },
        {
            "titre": "📖 Lexique grammatical",
            "seances": [
                { "titre": "Les termes essentiels", "fichiers": [{"nom": "Glossaire", "url": "pdf/2nde/glossaire_grammaire.pdf"}] }
            ]
        }
    ];

    // ==================== FONCTIONS D'AFFICHAGE ====================

    function buildAccordion(containerId, data) {
        const container = document.getElementById(containerId);
        if (!container) return;
        let html = '';
        data.forEach((item, idx) => {
            html += `<div class="accordion-item">
                        <div class="accordion-header" data-accordion="${idx}">
                            <span>${item.titre}</span>
                            <i class="fas fa-chevron-down"></i>
                        </div>
                        <div class="accordion-content" id="accordion-content-${idx}">
                            <ul class="seance-list">`;
            item.seances.forEach(seance => {
                html += `<li><span class="seance-title">📌 ${seance.titre}</span>`;
                if (seance.fichiers && seance.fichiers.length) {
                    html += `<ul class="file-list" style="margin-top:0.5rem;">`;
                    seance.fichiers.forEach(f => {
                        let icon = 'fas fa-file-pdf';
                        if (f.url.endsWith('.mp3')) icon = 'fas fa-headphones';
                        else if (f.url.includes('youtube')) icon = 'fab fa-youtube';
                        html += `<li><i class="${icon}"></i> <a href="${f.url}" target="_blank">${f.nom}</a></li>`;
                    });
                    html += `</ul>`;
                }
                html += `</li>`;
            });
            html += `</ul></div></div>`;
        });
        container.innerHTML = html;

        document.querySelectorAll(`#${containerId} .accordion-header`).forEach(header => {
            header.addEventListener('click', function() {
                const content = this.nextElementSibling;
                const icon = this.querySelector('i');
                content.classList.toggle('open');
                icon.style.transform = content.classList.contains('open') ? 'rotate(180deg)' : 'rotate(0deg)';
            });
        });
    }

    async function loadCahierTexte(classe, containerId) {
        const container = document.getElementById(containerId);
        try {
            const response = await fetch('cahierdetexte.json');
            if (!response.ok) throw new Error();
            const data = await response.json();
            const entries = data.filter(entry => entry.classe === classe);
            if (entries.length === 0) {
                container.innerHTML = '<p>Aucune entrée pour le moment.</p>';
                return;
            }
            let html = `<table class="planning-table">
                            <thead>
                                <tr><th>Date</th><th>Séance</th><th>À faire</th></tr>
                            </thead>
                            <tbody>`;
            entries.forEach(entry => {
                html += `<tr>
                            <td>${entry.date || ''}</td>
                            <td>${entry.seance || ''}</td>
                            <td>${entry.aFaire || ''}</td>
                         </tr>`;
            });
            html += `</tbody>
                     </table>`;
            container.innerHTML = html;
        } catch (error) {
            container.innerHTML = '<p>Impossible de charger le cahier de texte. Vérifiez le fichier cahierdetexte.json (classe "seconde").</p>';
        }
    }

    function buildDsdmList(containerId, list) {
        const container = document.getElementById(containerId);
        if (!container) return;
        let html = `<ul class="file-list">`;
        list.forEach(item => {
            html += `<li><i class="fas fa-file-pdf"></i> <a href="${item.url}" target="_blank">${item.nom}</a></li>`;
        });
        html += `</ul>`;
        container.innerHTML = html;
    }

    // ==================== GESTION DES ONGLETS ====================
    const tabs = document.querySelectorAll('.tab-btn');
    const contents = document.querySelectorAll('.tab-content');
    tabs.forEach(tab => {
        tab.addEventListener('click', () => {
            const targetId = tab.getAttribute('data-tab');
            tabs.forEach(t => t.classList.remove('active'));
            contents.forEach(c => c.classList.remove('active'));
            tab.classList.add('active');
            document.getElementById(targetId).classList.add('active');
        });
    });

    // ==================== INITIALISATION ====================
    window.onload = () => {
        loadCahierTexte('seconde', 'cahier2-container');
        buildAccordion('projets2-container', projetsData);
        buildAccordion('chantier2-container', chantiersData);
        buildAccordion('jdl2-container', jdlData);
        buildDsdmList('dsdm2-container', dsdmlist);
        buildAccordion('methodo2-container', methodoData);
        buildAccordion('boite2-container', boiteData);
    };
</script>
</body>
</html>
