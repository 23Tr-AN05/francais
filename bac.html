    // Construction de l'onglet Œuvres (accordéon horizontal avec titre du livre choisi)
    function buildOeuvres() {
        const container = document.getElementById('oeuvres-container');
        if (!container) return;
        let html = '';
        genresData.forEach(genre => {
            html += `<div class="genre-container" style="background-color: ${genre.couleur}20; border-radius: 1.5rem; padding: 1rem; margin-bottom: 2rem;">`;
            html += `<div class="genre-title" style="background-color: ${genre.couleur};">${genre.nom}</div>`;
            html += `<div id="books-grid-${genre.id}" class="books-grid">`;
            genre.livres.forEach((livre, idx) => {
                html += `<div class="book-card" data-livre-idx="${idx}" data-genre-id="${genre.id}">
                            <img class="book-cover" src="${livre.image}" alt="${livre.titre}" onerror="this.src='https://placehold.co/140x200?text=Couverture'">
                            <div class="book-title">${livre.titre}</div>
                            <div class="image-source">${livre.source || 'Source'}</div>
                         </div>`;
            });
            html += `</div>`;
            html += `<div id="detail-${genre.id}" class="book-detail"></div>`;
            html += `</div>`;
        });
        container.innerHTML = html;

        // Ajouter les écouteurs sur chaque livre
        genresData.forEach(genre => {
            const grid = document.getElementById(`books-grid-${genre.id}`);
            if (!grid) return;
            const cards = grid.querySelectorAll('.book-card');
            cards.forEach((card, idx) => {
                card.addEventListener('click', () => {
                    const livre = genre.livres[idx];
                    const detailContainer = document.getElementById(`detail-${genre.id}`);
                    // Générer le contenu détaillé avec le titre du livre en évidence
                    let detailHtml = `<div class="back-link" data-genre-id="${genre.id}">← Retour aux livres</div>`;
                    detailHtml += `<div class="chosen-title">📖 ${livre.titre}</div>`;
                    
                    // Section Ressources générales et technologiques (les deux fichiers demandés)
                    detailHtml += `<div class="detail-section"><h4><i class="fas fa-database"></i> Ressources générales et technologiques</h4><ul class="file-list">`;
                    if (livre.precisGeneral) {
                        detailHtml += `<li><i class="fas fa-file-pdf"></i> <a href="${livre.precisGeneral.url}" target="_blank">${livre.precisGeneral.nom}</a></li>`;
                    }
                    if (livre.technologique) {
                        detailHtml += `<li><i class="fas fa-file-pdf"></i> <a href="${livre.technologique.url}" target="_blank">${livre.technologique.nom}</a></li>`;
                    }
                    detailHtml += `</ul></div>`;

                    // Section Cours
                    detailHtml += `<div class="detail-section"><h4><i class="fas fa-book-open"></i> Cours</h4><ul class="file-list">`;
                    livre.cours.forEach(f => {
                        detailHtml += `<li><i class="fas fa-file-pdf"></i> <a href="${f.url}" target="_blank">${f.nom}</a></li>`;
                    });
                    detailHtml += `</ul></div>`;

                    // Section Explication de texte
                    detailHtml += `<div class="detail-section"><h4><i class="fas fa-comment-dots"></i> Explication de texte</h4><ul class="file-list">`;
                    livre.explications.forEach(f => {
                        detailHtml += `<li><i class="fas fa-file-pdf"></i> <a href="${f.url}" target="_blank">${f.nom}</a></li>`;
                    });
                    detailHtml += `</ul></div>`;

                    // Section S'entraîner
                    detailHtml += `<div class="detail-section"><h4><i class="fas fa-pen-fancy"></i> S'entraîner</h4><ul class="file-list">`;
                    livre.entrainements.forEach(f => {
                        detailHtml += `<li><i class="fas fa-file-pdf"></i> <a href="${f.url}" target="_blank">${f.nom}</a></li>`;
                    });
                    detailHtml += `</ul></div>`;

                    detailContainer.innerHTML = detailHtml;
                    detailContainer.classList.add('active');
                    // Masquer la grille des livres pour ce genre
                    grid.style.display = 'none';
                    // Écouteur sur le bouton retour
                    const backLink = detailContainer.querySelector('.back-link');
                    if (backLink) {
                        backLink.addEventListener('click', () => {
                            grid.style.display = 'flex';
                            detailContainer.classList.remove('active');
                            detailContainer.innerHTML = '';
                        });
                    }
                });
            });
        });
    }

        const container = document.getElementById(containerId);
        if (!container) return;
        let html = '';
        data.forEach((item, idx) => {
            html += `<div class="accordion-item">
                        <div class="accordion-header" data-accordion="${idx}">
                            <span>${item.titre}</span>
                            <i class="fas fa-chevron-down"></i>
                        </div>
                        <div class="accordion-content" id="accordion-content-${idx}">
                            <ul class="seance-list">`;
            item.seances.forEach(seance => {
                html += `<li><span class="seance-title">📌 ${seance.titre}</span>`;
                if (seance.fichiers && seance.fichiers.length) {
                    html += `<ul class="file-list" style="margin-top:0.5rem;">`;
                    seance.fichiers.forEach(f => {
                        let icon = 'fas fa-file-pdf';
                        if (f.url.endsWith('.mp3')) icon = 'fas fa-headphones';
                        else if (f.url.includes('youtube')) icon = 'fab fa-youtube';
                        html += `<li><i class="${icon}"></i> <a href="${f.url}" target="_blank">${f.nom}</a></li>`;
                    });
                    html += `</ul>`;
                }
                html += `</li>`;
            });
            html += `</ul></div></div>`;
        });
        container.innerHTML = html;
        document.querySelectorAll(`#${containerId} .accordion-header`).forEach(header => {
            header.addEventListener('click', function() {
                const content = this.nextElementSibling;
                const icon = this.querySelector('i');
                content.classList.toggle('open');
                icon.style.transform = content.classList.contains('open') ? 'rotate(180deg)' : 'rotate(0deg)';
            });
        });
    }

    async function loadCahierTexte(classe, containerId) {
        const container = document.getElementById(containerId);
        try {
            const response = await fetch('cahierdetexte.json');
            if (!response.ok) throw new Error();
            const data = await response.json();
            const entries = data.filter(entry => entry.classe === classe);
            if (entries.length === 0) {
                container.innerHTML = '<p>Aucune entrée pour le moment.</p>';
                return;
            }
            let html = `<table class="planning-table"><thead><tr><th>Date</th><th>Séance</th><th>À faire</th></tr></thead><tbody>`;
            entries.forEach(entry => {
                html += `<tr>
                            <td>${entry.date || ''}</td>
                            <td>${entry.seance || ''}</td>
                            <td>${entry.aFaire || ''}</td>
                         </tr>`;
            });
            html += `</tbody></td>`;
            container.innerHTML = html;
        } catch (error) {
            container.innerHTML = '<p>Impossible de charger le cahier de texte.</p>';
        }
    }

    function buildDsdmList(containerId, list) {
        const container = document.getElementById(containerId);
        if (!container) return;
        let html = `<ul class="file-list">`;
        list.forEach(item => {
            html += `<li><i class="fas fa-file-pdf"></i> <a href="${item.url}" target="_blank">${item.nom}</a></li>`;
        });
        html += `</ul>`;
        container.innerHTML = html;
    }

    // Gestion des onglets principaux
    const tabs = document.querySelectorAll('.tab-btn');
    const contents = document.querySelectorAll('.tab-content');
    tabs.forEach(tab => {
        tab.addEventListener('click', () => {
            const targetId = tab.getAttribute('data-tab');
            tabs.forEach(t => t.classList.remove('active'));
            contents.forEach(c => c.classList.remove('active'));
            tab.classList.add('active');
            document.getElementById(targetId).classList.add('active');
        });
    });

    window.onload = () => {
        loadCahierTexte('premiere', 'cahierBac-container');
        buildOeuvres();
        buildAccordion('chantierBac-container', chantiersData);
        buildAccordion('jdlBac-container', jdlData);
        buildDsdmList('dsdmBac-container', dsdmlist);
        buildAccordion('methodoBac-container', methodoData);
        buildAccordion('boiteBac-container', boiteData);
    };
</script>
</body>
</html>
